<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Screener by Gitesh</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 Resume Screener by Gitesh</h1>
            <p>Upload a Job Description and candidate resumes to see match scores and summaries.</p>
        </header>

        <form method="POST" enctype="multipart/form-data">
            <label for="jd_text">📝 Job Description</label>
            <textarea name="jd_text" id="jd_text" placeholder="Paste job description here..." required>{{ jd_text or '' }}</textarea>

            <label for="resumes">📎 Upload Resumes (PDF/DOCX)</label>
            <input type="file" name="resumes" id="resumes" multiple required>

            <button type="submit">🔍 Analyze</button>
        </form>

        {% if results %}
        <section class="results">
            <h2>📊 Match Results</h2>
            {% for res in results %}
            <div class="result-block">
                <h3>📁 {{ res.filename }}</h3>
                <p class="score">
                    Match Score: <strong>{{ res.score }}%</strong>
                    <span class="tag {{ res.label|lower }}">{{ res.label }}</span>
                </p>
                <div class="summary-block">
                    <pre>{{ res.summary }}</pre>
                </div>
            </div>
            {% endfor %}
        </section>
        {% endif %}
    </div>
</body>
</html>
